{% extends 'base.html' %}
{% block title %}Зміна паролю — SkinsMarket{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Зміна паролю</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<span class="field-error">{{ field.errors }}</span>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn--primary" style="width:100%;margin-top:1rem">Змінити пароль</button>
        </form>
        <div class="auth-footer"><a href="{% url 'profile' %}">← Назад до кабінету</a></div>
    </div>
</div>
{% endblock %}
